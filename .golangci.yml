run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - bodyclose
    - noctx
    - exhaustive

linters-settings:
  goimports:
    local-prefixes: github.com/gothi/vouchrs
  revive:
    rules:
      - name: exported
        disabled: false
  gosec:
    excludes:
      - G304 # file inclusion via variable — acceptable in scraper

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
