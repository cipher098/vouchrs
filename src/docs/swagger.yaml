host: localhost:8080
info:
  contact:
    email: support@vouchrs.in
    name: Vouchrs Support
  description: P2P gift card exchange marketplace. Card codes are AES-256 encrypted
    at rest and **never returned in API responses** — they are delivered to the buyer's
    registered email only.
  title: Vouchrs API
  version: "1.0"
paths:
  /api/v1/admin/auth/callback:
    get:
      description: Google redirects here after consent. Returns JWT tokens if the
        email is in the admin allowlist.
      parameters:
      - description: OAuth authorization code from Google
        in: query
        name: code
        required: true
        type: string
      - description: OAuth state
        in: query
        name: state
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Tokens and admin user
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/src_delivery_http_handler.verifyOTPResponse'
              type: object
        "400":
          description: Missing code
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Email not in admin allowlist
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      summary: Admin — Google OAuth callback
      tags:
      - admin-auth
  /api/v1/admin/auth/login:
    get:
      description: Redirects the admin browser to Google's OAuth consent page. Open
        this URL directly in a browser.
      parameters:
      - description: CSRF state token
        example: '"cardswap_admin"'
        in: query
        name: state
        type: string
      responses:
        "307":
          description: Redirect to Google OAuth consent page
      summary: Admin — initiate Google OAuth login
      tags:
      - admin-auth
  /api/v1/admin/card-requests:
    get:
      description: Returns all card requests submitted by buyers that need admin review.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_gothi_vouchrs_src_internal_domain_entity.CardRequest'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Admin role required
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: List pending card requests (admin)
      tags:
      - admin
  /api/v1/admin/card-requests/{id}:
    patch:
      consumes:
      - application/json
      description: Approve, reject, or defer a buyer's card request. Sends an email
        notification to the buyer.
      parameters:
      - description: Card request UUID
        in: path
        name: id
        required: true
        type: string
      - description: Review decision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/src_delivery_http_handler.reviewCardRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: updated
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Admin role required
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: Review a card request (admin)
      tags:
      - admin
  /api/v1/admin/fraud-flags:
    get:
      description: Returns all open fraud flags raised during Gate 2 verification
        failures or manual reviews.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_gothi_vouchrs_src_internal_domain_entity.FraudFlag'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Admin role required
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: List unresolved fraud flags (admin)
      tags:
      - admin
  /api/v1/admin/fraud-flags/{id}/resolve:
    patch:
      description: Mark a fraud flag as reviewed and resolved.
      parameters:
      - description: Fraud flag UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: resolved
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Admin role required
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: Resolve a fraud flag (admin)
      tags:
      - admin
  /api/v1/admin/listings:
    get:
      description: Paginated list of every listing on the platform, regardless of
        status.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_gothi_vouchrs_src_internal_domain_entity.Listing'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Admin role required
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: List all listings (admin)
      tags:
      - admin
  /api/v1/admin/stats:
    get:
      description: 'Returns aggregated platform metrics: total users, live listings,
        GMV, pending card requests, and open fraud flags.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_gothi_vouchrs_src_internal_domain_port.AdminStats'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Admin role required
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: Platform statistics (admin)
      tags:
      - admin
  /api/v1/admin/transactions:
    get:
      description: Paginated list of every transaction on the platform.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_gothi_vouchrs_src_internal_domain_entity.Transaction'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Admin role required
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: List all transactions (admin)
      tags:
      - admin
  /api/v1/admin/users/{id}/ban:
    patch:
      description: Permanently ban a user. Banned users cannot create listings or
        initiate purchases.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: user banned
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
