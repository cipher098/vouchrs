                data:
                  $ref: '#/definitions/github_com_gothi_vouchrs_src_internal_domain_entity.Listing'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
