  /api/v1/listings/{id}/buy:
    post:
      consumes:
      - application/json
      description: Runs Gate 2 re-verification, atomically locks the listing for 10
        minutes, creates a pending transaction, and returns a PhonePe payment URL.
        The buyer must complete payment before lock_expires_at or the listing is released.
        **The card code is never returned here** — it is sent to the buyer's email
        after payment succeeds.
      parameters:
      - description: Listing UUID to purchase
        in: path
        name: id
        required: true
        type: string
      - description: Optional return URL for PhonePe redirect
        in: body
        name: body
        schema:
          $ref: '#/definitions/src_delivery_http_handler.initiateBuyBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/src_delivery_http_handler.initiateBuyResponse'
              type: object
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Buyer is banned or trying to buy own listing
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "409":
          description: Listing locked or not available (LISTING_LOCKED / LISTING_NOT_AVAILABLE)
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "422":
          description: Gate 2 failed — card was tampered (CARD_TAMPERED)
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: Initiate purchase (buyer)
      tags:
      - purchase
