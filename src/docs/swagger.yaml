          description: Gate 2 failed (CARD_TAMPERED)
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: Initiate purchase from pool group (buyer)
      tags:
      - purchase
  /api/v1/transactions/{id}:
    get:
      description: Returns a transaction. Only the buyer or seller of that transaction
        can access it.
      parameters:
      - description: Transaction UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_gothi_vouchrs_src_internal_domain_entity.Transaction'
              type: object
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Not a party to this transaction
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: Get transaction details
      tags:
      - purchase
  /api/v1/transactions/{id}/confirm:
    post:
      description: Called by the buyer after they have successfully used the gift
        card. Marks the transaction as completed and triggers the seller payout.
      parameters:
      - description: Transaction UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: redemption confirmed
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "403":
          description: Not the buyer of this transaction
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: Confirm card redemption (buyer)
      tags:
      - purchase
  /api/v1/users/me:
    get:
      description: Returns the authenticated user's ID, role, and email decoded from
        the JWT claims.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/src_delivery_http_handler.meResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - auth
  /api/v1/webhooks/phonepe:
    post:
      consumes:
      - application/json
      description: 'Receives payment SUCCESS/FAILURE events from PhonePe. Verified
        via X-VERIFY checksum header. On success: marks listing sold, emails card
        code to buyer (never in response body), queues payout. On failure: unlocks
        listing.'
      parameters:
      - description: PhonePe SHA256 checksum
        in: header
        name: X-VERIFY
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: acknowledged
          schema:
            allOf:
            - $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Invalid signature or body
          schema:
            $ref: '#/definitions/github_com_gothi_vouchrs_src_delivery_http_response.Response'
      summary: PhonePe payment webhook (internal)
      tags:
      - webhooks
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'JWT access token. Format: `Bearer <token>`'
    in: header
    name: Authorization
    type: apiKey
